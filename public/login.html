<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseChat — Login</title>
    <link rel="stylesheet" href="./auth.css" />
</head>
<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-wrapper">

        <div class="auth-card">

            <div class="auth-brand">
                <div class="brand-icon">⚡</div>
                <h1 class="brand-name">PulseChat</h1>
            </div>

            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to continue chatting</p>
            </div>

            <div id="error-msg" class="error-msg hidden">Incorrect email or password.</div>

            <form id="login-form">

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required />
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-loader" class="hidden">...</span>
                </button>

            </form>

            <p class="auth-switch">
                Don't have an account? <a href="/signup.html">Create one</a>
            </p>

        </div>

    </div>

    <script>
        const form = document.querySelector("#login-form");
        const errorMsg = document.querySelector("#error-msg");
        const btnText = document.querySelector("#btn-text");
        const btnLoader = document.querySelector("#btn-loader");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.querySelector("#email").value.trim();
            const password = document.querySelector("#password").value;

            errorMsg.classList.add("hidden");
            btnText.classList.add("hidden");
            btnLoader.classList.remove("hidden");

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || "Login failed.";
                    errorMsg.classList.remove("hidden");
                } else {
                    localStorage.setItem("token", data.token);
                    localStorage.setItem("userName", data.name);
                    window.location.href = "/index.html";
                }
            } catch (err) {
                errorMsg.textContent = "Something went wrong. Try again.";
                errorMsg.classList.remove("hidden");
            } finally {
                btnText.classList.remove("hidden");
                btnLoader.classList.add("hidden");
            }
        });


    </script>

</body>
</html>
